apiVersion: apps/v1
kind: Deployment
metadata:
  name: reto2api
spec:
  replicas: 4 
  selector:
    matchLabels:
      app: reto2api
  template:
    metadata:
      labels:
        app: reto2api 
    spec:
      containers:
      - name: reto2api
        image: reto2api:dev 
        imagePullPolicy: Always
        ports:
        - containerPort: 8080 
        # resources:
