apiVersion: apps/v1
kind: Deployment
metadata:
  name: reto2-gateway-service
  labels:
    app: reto2-gateway-service
spec:
  replicas: 2 # Scale based on traffic
  selector:
    matchLabels:
      app: reto2-gateway-service
  template:
    metadata:
      labels:
        app: reto2-gateway-service
    spec:
      containers:
      - name: reto2-gateway-service
        image: reto2-gateway-service:latest # Update with your image
        # ports:
        # - containerPort: 80 # Default HTTP port
        # env:
        # - name: ASPNETCORE_ENVIRONMENT
        #   value: "Production"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"



